name: Homebrew
# Release the `colophon` CLI to Homebrew. Same shape as fig's homebrew.yml, but
# the binaries are built with cargo (colophon is a Rust workspace; the CLI is
# the `colophon-cli` crate, whose binary is named `colophon`). Three jobs:
# 1. build macOS binaries (arm64, x86_64) and
# 2. Linux binaries (x86_64, aarch64), attach them to this repo's GitHub
#    Release, then
# 3. render the formula with the release's version + checksums and push it to
#    the tap repo.
#
# Per-arch prebuilt binaries (not a source `depends_on "rust"` formula): users
# don't need a Rust toolchain, and installs are fast.
#
# Cross builds: macOS arm64 is native on the macos-latest runner and x86_64 is a
# rustup cross-target (Apple's linker handles both). On Linux, x86_64 is native
# and aarch64 uses the gcc-aarch64-linux-gnu cross linker.
#
# Runs on `v*.*.*` tags. Prerequisite before the first tagged release: add a
# HOMEBREW_TAP_TOKEN secret to this repo — a PAT with contents:write on
# adammharris/homebrew-tap.
on:
  push: { tags: [v*.*.*] }
  workflow_dispatch: null
permissions:
  contents: write # the binary jobs attach assets to the GitHub Release
jobs:
  macos-binaries:
    name: Build + attach macOS binaries
    runs-on: macos-latest
    if: github.ref_type == 'tag'
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with: { targets: "aarch64-apple-darwin,x86_64-apple-darwin" }
    - name: Build macOS arm64
      run: |
        cargo build --release -p colophon-cli --target aarch64-apple-darwin
        tar -czf colophon-macos-arm64.tar.gz -C target/aarch64-apple-darwin/release colophon
    - name: Build macOS x86_64
      run: |
        cargo build --release -p colophon-cli --target x86_64-apple-darwin
        tar -czf colophon-macos-x86_64.tar.gz -C target/x86_64-apple-darwin/release colophon
    - name: Attach to the GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          colophon-macos-arm64.tar.gz
          colophon-macos-x86_64.tar.gz
  linux-binaries:
    name: Build + attach Linux binaries
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with: { targets: "x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu" }
    - name: Install aarch64 cross linker
      run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
    - name: Build Linux x86_64
      run: |
        cargo build --release -p colophon-cli --target x86_64-unknown-linux-gnu
        tar -czf colophon-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release colophon
    - name: Build Linux aarch64
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: |
        cargo build --release -p colophon-cli --target aarch64-unknown-linux-gnu
        tar -czf colophon-linux-aarch64.tar.gz -C target/aarch64-unknown-linux-gnu/release colophon
    - name: Attach to the GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          colophon-linux-x86_64.tar.gz
          colophon-linux-aarch64.tar.gz
  bump-formula:
    name: Bump tap formula
    runs-on: ubuntu-latest
    needs: [macos-binaries, linux-binaries]
    if: github.ref_type == 'tag'
    steps:
    - name: Compute checksums and render the Homebrew formula
      run: |
        version="${GITHUB_REF_NAME#v}"
        base="https://github.com/adammharris/colophon/releases/download/${GITHUB_REF_NAME}"
        mac_arm64_sha=$(curl -sL "$base/colophon-macos-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
        mac_x64_sha=$(curl -sL "$base/colophon-macos-x86_64.tar.gz" | sha256sum | cut -d' ' -f1)
        linux_x64_sha=$(curl -sL "$base/colophon-linux-x86_64.tar.gz" | sha256sum | cut -d' ' -f1)
        linux_arm64_sha=$(curl -sL "$base/colophon-linux-aarch64.tar.gz" | sha256sum | cut -d' ' -f1)
        cat > /tmp/colophon.rb <<RUBY
        class Colophon < Formula
          desc "Command-line companion for the colophon self-describing workspace library"
          homepage "https://github.com/adammharris/colophon"
          version "$version"
          license "MIT OR Apache-2.0"

          on_macos do
            on_arm do
              url "https://github.com/adammharris/colophon/releases/download/v$version/colophon-macos-arm64.tar.gz"
              sha256 "$mac_arm64_sha"
            end
            on_intel do
              url "https://github.com/adammharris/colophon/releases/download/v$version/colophon-macos-x86_64.tar.gz"
              sha256 "$mac_x64_sha"
            end
          end

          on_linux do
            on_arm do
              url "https://github.com/adammharris/colophon/releases/download/v$version/colophon-linux-aarch64.tar.gz"
              sha256 "$linux_arm64_sha"
            end
            on_intel do
              url "https://github.com/adammharris/colophon/releases/download/v$version/colophon-linux-x86_64.tar.gz"
              sha256 "$linux_x64_sha"
            end
          end

          def install
            bin.install "colophon"
          end

          test do
            assert_match version.to_s, shell_output("#{bin}/colophon --version")
          end
        end
        RUBY
    - name: Push to the tap
      env: { COMMITTER_TOKEN: '${{ secrets.HOMEBREW_TAP_TOKEN }}' }
      run: |
        git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/adammharris/homebrew-tap" tap
        cp /tmp/colophon.rb tap/Formula/colophon.rb
        cd tap
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/colophon.rb
        if git diff --cached --quiet; then
          echo "Formula unchanged — skipping commit"
        else
          git commit -m "colophon ${GITHUB_REF_NAME#v}"
          git push
        fi
